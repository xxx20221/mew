<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CompanyPro | نظام إدارة الشركة المتكامل</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
--p:#4F46E5;--pl:#6366F1;--pp:rgba(79,70,229,.12);
--ok:#10B981;--err:#EF4444;--warn:#F59E0B;--info:#3B82F6;
--purple:#8B5CF6;--teal:#14B8A6;--pink:#EC4899;
--bg:#F1F5F9;--sf:#fff;--sf2:#F8FAFC;
--t1:#0F172A;--t2:#475569;--t3:#94A3B8;
--bd:#E2E8F0;--sb:#0F172A;
--sh:0 2px 10px rgba(0,0,0,.07);--shm:0 4px 20px rgba(0,0,0,.10);--shl:0 8px 30px rgba(0,0,0,.14);
--r:12px;--rl:18px;
}
[data-theme=dark]{
--bg:#0B0F1A;--sf:#141927;--sf2:#1C2537;
--t1:#F1F5F9;--t2:#94A3B8;--t3:#475569;
--bd:#1E2D40;--sb:#080C16;
--sh:0 2px 10px rgba(0,0,0,.3);--shm:0 4px 20px rgba(0,0,0,.4);--shl:0 8px 30px rgba(0,0,0,.5);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--t1);direction:rtl;min-height:100vh;transition:background .3s,color .3s}
.layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:258px;background:var(--sb);position:fixed;top:0;right:0;bottom:0;display:flex;flex-direction:column;transition:width .3s;z-index:200;overflow:hidden}
.sidebar.col{width:68px}
.sb-logo{padding:18px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.07);min-height:66px}
.sb-logo-ic{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#4F46E5,#818CF8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0}
.sb-logo-tx{color:#fff;font-weight:900;font-size:14px;white-space:nowrap;transition:opacity .2s}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.38);font-weight:400;white-space:nowrap}
.sidebar.col .sb-logo-tx,.sidebar.col .n-txt,.sidebar.col .n-sec,.sidebar.col .n-bdg{opacity:0;width:0;overflow:hidden}
.sb-nav{flex:1;padding:10px 9px;overflow-y:auto;overflow-x:hidden}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.n-sec{font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.26);padding:8px 9px 3px;white-space:nowrap;transition:opacity .2s}
.n-item{display:flex;align-items:center;gap:9px;padding:9px 9px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.52);transition:all .2s;margin-bottom:2px;white-space:nowrap;position:relative}
.n-item:hover{background:rgba(255,255,255,.07);color:#fff}
.n-item.act{background:linear-gradient(135deg,#4F46E5,#6366F1);color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.4)}
.n-ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.n-txt{font-size:13px;font-weight:600;transition:opacity .2s,width .2s}
.n-bdg{margin-right:auto;background:var(--err);color:#fff;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:800;transition:opacity .2s}
.n-tt{position:absolute;right:calc(100% + 7px);top:50%;transform:translateY(-50%);background:#1E293B;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:300}
.sidebar.col .n-item:hover .n-tt{opacity:1}
.sb-foot{padding:12px 9px;border-top:1px solid rgba(255,255,255,.07)}

/* MAIN */
.main{margin-right:258px;min-height:100vh;display:flex;flex-direction:column;transition:margin .3s}
.main.exp{margin-right:68px}
.topbar{height:64px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 22px;gap:10px;position:sticky;top:0;z-index:100;transition:background .3s,border .3s;box-shadow:var(--sh)}
.tb-title{font-size:17px;font-weight:900;color:var(--t1)}
.tb-sub{font-size:11.5px;color:var(--t3);font-weight:400}
.tb-btn{width:37px;height:37px;border-radius:9px;border:none;background:var(--sf2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;position:relative;flex-shrink:0}
.tb-btn:hover{background:var(--p);color:#fff}
.n-dot{position:absolute;top:6px;left:6px;width:7px;height:7px;background:var(--err);border-radius:50%;border:2px solid var(--sf)}
.pg{padding:22px;flex:1}
.usr-pill{display:flex;align-items:center;gap:7px;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:4px 10px 4px 5px;cursor:pointer}
.usr-pill:hover{border-color:var(--p)}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);box-shadow:var(--sh);transition:all .3s}
.cp{padding:20px}
.ct{font-size:14.5px;font-weight:800;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.cs{font-size:11.5px;color:var(--t3);font-weight:400;margin-right:auto}

/* STAT GRID */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:16px;margin-bottom:20px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;box-shadow:var(--sh);transition:all .3s;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;right:0;width:100%;height:3px}
.sc.c1::after{background:linear-gradient(90deg,#10B981,#34D399)}
.sc.c2::after{background:linear-gradient(90deg,#EF4444,#F87171)}
.sc.c3::after{background:linear-gradient(90deg,#4F46E5,#818CF8)}
.sc.c4::after{background:linear-gradient(90deg,#F59E0B,#FCD34D)}
.sc.c5::after{background:linear-gradient(90deg,#8B5CF6,#A78BFA)}
.sc.c6::after{background:linear-gradient(90deg,#14B8A6,#2DD4BF)}
.sc:hover{transform:translateY(-3px);box-shadow:var(--shm)}
.sh2{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.sl{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.sv{font-size:26px;font-weight:900;color:var(--t1);line-height:1;letter-spacing:-1px}
.si2{width:43px;height:43px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.i1{background:rgba(16,185,129,.12);color:#10B981}.i2{background:rgba(239,68,68,.12);color:#EF4444}
.i3{background:rgba(79,70,229,.12);color:#4F46E5}.i4{background:rgba(245,158,11,.12);color:#F59E0B}
.i5{background:rgba(139,92,246,.12);color:#8B5CF6}.i6{background:rgba(20,184,166,.12);color:#14B8A6}
.sdc{font-size:11.5px;font-weight:700;display:flex;align-items:center;gap:3px;margin-top:6px}
.up{color:#10B981}.dn{color:#EF4444}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 17px;border-radius:9px;border:none;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-p{background:linear-gradient(135deg,#4F46E5,#6366F1);color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-p:hover{box-shadow:0 6px 18px rgba(79,70,229,.4)}
.btn-ok{background:linear-gradient(135deg,#10B981,#34D399);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.btn-err{background:linear-gradient(135deg,#EF4444,#F87171);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.3)}
.btn-w{background:linear-gradient(135deg,#F59E0B,#FCD34D);color:#fff;box-shadow:0 4px 12px rgba(245,158,11,.3)}
.btn-g{background:var(--sf2);color:var(--t2);border:1px solid var(--bd)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-ic{width:32px;height:32px;padding:0;justify-content:center;border-radius:8px}

/* BADGE */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800}
.bg{background:rgba(16,185,129,.12);color:#059669}
.br{background:rgba(239,68,68,.12);color:#DC2626}
.by{background:rgba(245,158,11,.12);color:#D97706}
.bb{background:rgba(59,130,246,.12);color:#2563EB}
.bpu{background:rgba(139,92,246,.12);color:#7C3AED}
.bgr{background:var(--sf2);color:var(--t2)}
.bt{background:rgba(20,184,166,.12);color:#0D9488}
.bpk{background:rgba(236,72,153,.12);color:#DB2777}

/* FORMS */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:4px}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:9px;background:var(--sf);color:var(--t1);font-family:'Cairo',sans-serif;font-size:13px;transition:all .2s;direction:rtl}
.fc:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.fc[readonly]{background:var(--sf2)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--sf2);color:var(--t2);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:10px 13px;text-align:right;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--bd);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--sf2)}
tbody td{padding:10px 13px;font-size:13px;color:var(--t1)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .25s}
.ov.show{opacity:1;visibility:visible}
.modal{background:var(--sf);border-radius:var(--rl);padding:24px;width:620px;max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid var(--bd);box-shadow:var(--shl);transform:scale(.92) translateY(16px);transition:transform .25s}
.ov.show .modal{transform:scale(1) translateY(0)}
.ml{width:780px}.ms{width:420px}
.mh{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--bd);margin-bottom:18px}
.mt2{font-size:16px;font-weight:900}
.mc{width:30px;height:30px;border-radius:7px;border:none;background:var(--sf2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mc:hover{background:var(--err);color:#fff}
.mf{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bd)}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--sf2);padding:4px;border-radius:10px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--t2);transition:all .2s;border:none;background:transparent;font-family:'Cairo',sans-serif}
.tab.act{background:var(--sf);color:var(--p);box-shadow:var(--sh)}

/* PROGRESS */
.pb{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s ease}

/* TOAST */
.tb2{position:fixed;top:74px;left:18px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.tst{background:var(--sf);border:1px solid var(--bd);border-radius:11px;padding:11px 14px;display:flex;align-items:center;gap:9px;box-shadow:var(--shl);min-width:250px;max-width:300px;animation:tin .3s ease;font-size:13px;font-weight:700}
.tic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.tok .tic{background:rgba(16,185,129,.12);color:#10B981}
.terr .tic{background:rgba(239,68,68,.12);color:#EF4444}
.tin2 .tic{background:rgba(79,70,229,.12);color:#4F46E5}
.twn .tic{background:rgba(245,158,11,.12);color:#F59E0B}
@keyframes tin{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}

/* ALERTS */
.al{padding:10px 13px;border-radius:9px;display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;margin-bottom:7px}
.aw{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#D97706}
.ae{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#DC2626}
.aok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#059669}
.ai{background:rgba(79,70,229,.1);border:1px solid rgba(79,70,229,.3);color:#4F46E5}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:11px}
.phl h1{font-size:19px;font-weight:900}
.phl p{font-size:12.5px;color:var(--t2);margin-top:2px}
.pha{display:flex;gap:9px;align-items:center;flex-wrap:wrap}

/* FILTER BAR */
.fb{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.fb .fc{width:auto;min-width:125px;padding:7px 11px}
.sw{position:relative}.sw input{padding-left:32px}
.si3{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0}
.av-m{width:38px;height:38px;font-size:14px}
.av-s{width:30px;height:30px;font-size:11px}

/* CHARTS ROW */
.cr{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:20px}

/* EMPTY */
.empty{text-align:center;padding:45px 20px;color:var(--t3)}
.empty i{font-size:42px;margin-bottom:12px;opacity:.45;display:block}
.empty p{font-size:14.5px;font-weight:800}
.empty span{font-size:12.5px}

/* REPORT GRID */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px;margin-bottom:20px}
.rc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;gap:9px}
.rc:hover{transform:translateY(-4px);box-shadow:var(--shm);border-color:var(--p)}
.ri{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px}
.rt{font-size:13.5px;font-weight:800;color:var(--t1)}
.rs{font-size:11.5px;color:var(--t2)}

/* MISC */
.hidden{display:none!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* RESPONSIVE */
@media(max-width:1024px){.cr{grid-template-columns:1fr}.r3{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
.sidebar{width:68px}.sidebar .sb-logo-tx,.sidebar .n-txt,.sidebar .n-sec,.sidebar .n-bdg{opacity:0;width:0;overflow:hidden}
.main{margin-right:68px}.sg{grid-template-columns:1fr 1fr}.pg{padding:13px}.r2,.r3{grid-template-columns:1fr}.cr{grid-template-columns:1fr}.ph{flex-direction:column;align-items:flex-start}
}
@media(max-width:480px){.sg{grid-template-columns:1fr}}
@media print{.sidebar,.topbar{display:none!important}.main{margin-right:0!important}.pg{padding:0!important}}
</style>
</head>
<body>
<div class="layout" id="app">

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-ic"><i class="fas fa-city"></i></div>
    <div>
      <div class="sb-logo-tx">CompanyPro</div>
      <div class="sb-logo-sub sb-logo-tx">نظام الإدارة المتكامل</div>
    </div>
  </div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot">
    <div class="n-item" onclick="toggleTheme()">
      <i class="n-ic fas fa-moon" id="themeIc"></i>
      <span class="n-txt">الوضع الليلي</span>
      <span class="n-tt">الوضع الليلي</span>
    </div>
    <div class="n-item" onclick="toggleSB()">
      <i class="n-ic fas fa-angles-right" id="sbIc"></i>
      <span class="n-txt">طي القائمة</span>
      <span class="n-tt">طي القائمة</span>
    </div>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<div class="main" id="mainA">
  <header class="topbar">
    <div style="min-width:0">
      <div class="tb-title" id="pgTitle">لوحة التحكم</div>
      <div class="tb-sub" id="pgSub">نظرة عامة شاملة</div>
    </div>
    <div style="flex:1"></div>
    <div class="sw" style="width:190px">
      <input type="text" class="fc" placeholder="بحث سريع..." id="gSearch" style="padding:7px 11px 7px 32px;font-size:12.5px" onkeydown="gSearchFn(event)">
      <i class="fas fa-search si3"></i>
    </div>
    <button class="tb-btn" onclick="showNotif()" title="التنبيهات"><i class="fas fa-bell"></i><span class="n-dot" id="nDot"></span></button>
    <button class="tb-btn" onclick="navigateTo('reports')" title="التقارير"><i class="fas fa-file-chart-line"></i></button>
    <div class="usr-pill" onclick="toast2('إدارة المستخدمين - قريباً','info')">
      <div class="av av-s" style="background:linear-gradient(135deg,#4F46E5,#818CF8);width:30px;height:30px;font-size:12px">م</div>
      <div style="font-size:12px;font-weight:800;color:var(--t1)">المدير العام</div>
      <i class="fas fa-chevron-down" style="font-size:9px;color:var(--t3)"></i>
    </div>
  </header>
  <main class="pg" id="pgBody"></main>
</div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="tb2" id="toastBox"></div>

<!-- ═══ CONFIRM ═══ -->
<div class="ov" id="ovConfirm">
  <div class="modal ms">
    <div class="mh"><span class="mt2" id="cfTitle">تأكيد</span><button class="mc" onclick="closeOv('ovConfirm')"><i class="fas fa-times"></i></button></div>
    <p style="font-size:13.5px;color:var(--t2);line-height:1.6" id="cfMsg"></p>
    <div class="mf">
      <button class="btn btn-g btn-sm" onclick="closeOv('ovConfirm')">إلغاء</button>
      <button class="btn btn-err btn-sm" id="cfOk">تأكيد الحذف</button>
    </div>
  </div>
</div>

<!-- ═══ PROJECT MODAL ═══ -->
<div class="ov" id="ovProject">
  <div class="modal">
    <div class="mh"><span class="mt2" id="projMT">إضافة مشروع</span><button class="mc" onclick="closeOv('ovProject')"><i class="fas fa-times"></i></button></div>
    <div class="r2">
      <div class="fg"><label class="fl">اسم المشروع *</label><input type="text" class="fc" id="pName"></div>
      <div class="fg"><label class="fl">الحالة</label>
        <select class="fc" id="pStatus"><option value="active">نشط</option><option value="planning">تخطيط</option><option value="completed">مكتمل</option><option value="paused">متوقف</option></select>
      </div>
    </div>
    <div class="r2">
      <div class="fg"><label class="fl">تاريخ البدء</label><input type="date" class="fc" id="pStart"></div>
      <div class="fg"><label class="fl">تاريخ الانتهاء</label><input type="date" class="fc" id="pEnd"></div>
    </div>
    <div class="r3">
      <div class="fg"><label class="fl">الميزانية (ريال)</label><input type="number" class="fc" id="pBudget"></div>
      <div class="fg"><label class="fl">إجمالي الوحدات</label><input type="number" class="fc" id="pUnits"></div>
      <div class="fg"><label class="fl">الوحدات المباعة</label><input type="number" class="fc" id="pSold"></div>
    </div>

<script>
/* ═══════════════════════════════════════════════
   STORAGE — memory-first, localStorage fallback
═══════════════════════════════════════════════ */
const _m={};
const st={
  get(k){try{const v=localStorage.getItem(k);if(v)return JSON.parse(v);}catch(e){}return _m[k]||[];},
  set(k,v){_m[k]=v;try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
  getO(k){try{const v=localStorage.getItem(k);if(v)return JSON.parse(v);}catch(e){}return _m[k]||{};}
};

function uid(){return'i'+Date.now()+Math.random().toString(36).slice(2,7);}

const DB={
  get(k){return st.get(k);},
  set(k,a){st.set(k,a);},
  find(k,id){return st.get(k).find(i=>i.id===id);},
  save(k,item){
    const a=st.get(k);const x=a.findIndex(i=>i.id===item.id);
    if(x>=0)a[x]=item;else a.unshift(item);
    st.set(k,a);audit(k,x>=0?'تعديل':'إضافة',item.id,item.name||item.id);
    return item;
  },
  del(k,id){
    const it=DB.find(k,id);
    st.set(k,st.get(k).filter(i=>i.id!==id));
    audit(k,'حذف',id,it?.name||id);
  }
};

function audit(mod,act,id,nm){
  const l=st.get('log');
  l.unshift({id:uid(),mod,act,id,nm,ts:new Date().toLocaleString('ar-SA'),u:'المدير العام'});
  if(l.length>300)l.pop();
  st.set('log',l);
}

/* ═══════════════════════════════════════════════
   SEED DATA
═══════════════════════════════════════════════ */
function seed(){
  if(DB.get('__seeded').length)return;
  const T=new Date();
  const fmt=d=>d.toISOString().split('T')[0];
  const add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const rnd=(a,b)=>Math.floor(Math.random()*(b-a)+a);

  const projects=[
    {id:'p1',name:'مشروع الأفق الأزرق السكني',status:'active',startDate:'2024-01-15',endDate:'2025-06-30',budget:12000000,totalUnits:48,soldUnits:31,progress:65,location:'الرياض - حي العليا',desc:'مشروع سكني فاخر 48 وحدة'},
    {id:'p2',name:'مشروع بيوت النخيل',status:'active',startDate:'2024-03-01',endDate:'2025-12-31',budget:8500000,totalUnits:30,soldUnits:18,progress:40,location:'جدة - حي الروضة',desc:'فيلات ومنازل فاخرة'},
    {id:'p3',name:'برج التميز التجاري',status:'planning',startDate:'2024-07-01',endDate:'2026-06-30',budget:22000000,totalUnits:120,soldUnits:0,progress:10,location:'الرياض - طريق الملك فهد',desc:'برج تجاري متعدد الاستخدامات'},
    {id:'p4',name:'واحة الهدوء السكنية',status:'completed',startDate:'2023-01-01',endDate:'2024-03-31',budget:5000000,totalUnits:20,soldUnits:20,progress:100,location:'المدينة المنورة',desc:'مشروع مكتمل'},
  ];
  st.set('projects',projects);

  const inc=['دفعة عميل','دفعة تعاقد','بيع وحدة','مقدم حجز','دفعة تسوية','إيجار','إيراد تشغيلي'];
  const exp=['تكلفة مقاول','مواد بناء','رواتب موقع','رسوم تسويق','كهرباء موقع','ثمن أرض','رسوم تصاريح','خدمات استشارية','مصاريف إدارية','صيانة'];
  const pids=['p1','p2','p3','p4'];
  const pays=['cash','transfer','check','installment'];
  const txs=[];
  for(let i=0;i<70;i++){
    const isInc=Math.random()>.42;
    const d=add(T,-rnd(0,365));
    txs.push({
      id:uid(),projectId:pids[rnd(0,4)],type:isInc?'income':'expense',
      category:isInc?inc[rnd(0,inc.length)]:exp[rnd(0,exp.length)],
      subCategory:isInc?'دفعة من العميل':'مستخلص مقاول',
      amount:rnd(50,500)*1000,
      paymentMethod:pays[rnd(0,4)],date:fmt(d),
      docNo:'INV-'+rnd(1000,9999),attachName:'فاتورة '+(i+1),notes:'',
      createdAt:new Date().toISOString()
    });
  }
  st.set('transactions',txs);

  const lNames=['أحمد محمد العمري','فاطمة علي الزهراني','خالد سعد الغامدي','نورة القحطاني','محمد الشمري','سارة الحربي','عبدالرحمن الدوسري','هند الخالدي','فيصل النفيسي','ريم السبيعي','تركي العجلان','منى المطيري','عبدالله الرشيد','لطيفة الصقري','ناصر البقمي','عمر الحازمي'];
  const srcs=['facebook','instagram','exhibition','website','referral','tiktok','snapchat'];
  const sts=['new','followup','visit','booking','contract','rejected'];
  const leads=lNames.map((name,i)=>({
    id:uid(),name,phone:'05'+rnd(10000000,99999999),
    email:name.split(' ')[0].toLowerCase()+'@gmail.com',
    source:srcs[i%srcs.length],status:sts[i%sts.length],
    projectId:pids[i%3],budget:rnd(300,2000)*1000,
    lastContact:fmt(add(T,-rnd(0,40))),notes:'عميل مهتم',
    createdAt:new Date().toISOString()
  }));
  st.set('leads',leads);

  const eNames=['محمد الشهري','سلمى القرني','عبدالعزيز الحربي','نوف الزهراني','أسامة المالكي','رنا العتيبي','كريم الأحمدي','وفاء الغامدي','تركي الرشيد','هلا البقمي'];
  const ePos=['مدير مشروع','مسوق عقاري','محاسب','مهندس مدني','مساعد إداري','مدير مبيعات','مصمم جرافيك','منسق عمليات','محلل مالي','مدير تسويق'];
  const eDeps=['management','sales','finance','engineering','operations','marketing','marketing','operations','finance','management'];
  const emps=eNames.map((name,i)=>({
    id:uid(),name,position:ePos[i],department:eDeps[i],
    salary:rnd(6,14)*1000,phone:'05'+rnd(10000000,99999999),
    email:name.split(' ')[0]+'@company.com',
    nationalId:'1'+rnd(100000000,999999999),
    bankAccount:'SA'+rnd(1e13,9e13),
    joinDate:fmt(add(T,-rnd(30,730))),
    projectId:i<4?pids[i]:'',status:i<9?'active':'inactive',
    createdAt:new Date().toISOString()
  }));
  st.set('employees',emps);

  const att=[];
  emps.forEach(e=>{
    for(let d=0;d<7;d++){
      const day=add(T,-d);
      if([5,6].includes(day.getDay()))return;
      att.push({id:uid(),employeeId:e.id,date:fmt(day),
        status:Math.random()>.1?'present':Math.random()>.5?'absent':'late',
        checkIn:'0'+(7+rnd(0,2))+':'+rnd(0,59).toString().padStart(2,'0'),
        notes:'',createdAt:new Date().toISOString()
      });
    }
  });
  st.set('attendance',att);

  const payroll=[];
  emps.forEach(e=>{
    for(let m=0;m<3;m++){

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function fC(n){return new Intl.NumberFormat('ar-SA',{style:'currency',currency:'SAR',maximumFractionDigits:0}).format(n||0);}
function fN(n){return new Intl.NumberFormat('ar-SA').format(n||0);}
function fD(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('ar-SA');}catch(e){return d;}}
function initials(s){if(!s)return'?';const w=s.trim().split(' ');return(w[0][0]+(w[1]?w[1][0]:'')).toUpperCase();}
function colorOf(s){const c=['#4F46E5','#10B981','#F59E0B','#EF4444','#8B5CF6','#14B8A6','#EC4899','#3B82F6'];let h=0;for(let i=0;i<s.length;i++)h+=s.charCodeAt(i);return c[h%c.length];}
function daysSince(d){if(!d)return999;return Math.floor((Date.now()-new Date(d))/86400000);}

function toast2(msg,t='ok'){
  const ic={ok:'fas fa-check',err:'fas fa-times',info:'fas fa-info',warn:'fas fa-exclamation'};
  const box=document.getElementById('toastBox');
  const id=uid();const el=document.createElement('div');
  el.className=`tst t${t}`;el.id=id;
  el.innerHTML=`<div class="tic"><i class="${ic[t]||'fas fa-info'}"></i></div><span>${msg}</span>`;
  box.appendChild(el);
  setTimeout(()=>{const e2=document.getElementById(id);if(e2){e2.style.opacity='0';e2.style.transform='translateX(-16px)';e2.style.transition='.3s';setTimeout(()=>e2.remove(),300);}},3200);
}

function openOv(id){document.getElementById(id).classList.add('show');}
function closeOv(id){document.getElementById(id).classList.remove('show');editId=null;}

function confirm2(title,msg,cb){
  document.getElementById('cfTitle').textContent=title;
  document.getElementById('cfMsg').textContent=msg;
  document.getElementById('cfOk').onclick=()=>{cb();closeOv('ovConfirm');};

function srcLbl(s){return{facebook:'فيسبوك',instagram:'إنستغرام',tiktok:'تيك توك',snapchat:'سناب شات',website:'موقع إلكتروني',referral:'إحالة',exhibition:'معرض',other:'أخرى'}[s]||s||'—';}
function srcIcon(s){return{facebook:'fab fa-facebook',instagram:'fab fa-instagram',tiktok:'fab fa-tiktok',snapchat:'fab fa-snapchat',website:'fas fa-globe',referral:'fas fa-handshake',exhibition:'fas fa-store',other:'fas fa-question'}[s]||'fas fa-question';}

/* ═══════════════════════════════════════════════
   ALERTS
═══════════════════════════════════════════════ */
function getAlerts(){
  const alerts=[];
  const T=new Date();
  DB.get('leads').forEach(l=>{
    if(l.status!=='contract'&&l.status!=='rejected'&&daysSince(l.lastContact)>7)
      alerts.push({t:'warn',msg:`العميل ${l.name} لم يُتواصل معه منذ ${daysSince(l.lastContact)} يوم`});
  });
  DB.get('projects').forEach(p=>{
    if(p.status==='active'&&p.endDate){
      const d=Math.floor((new Date(p.endDate)-T)/86400000);
      if(d>=0&&d<30)alerts.push({t:'warn',msg:`المشروع "${p.name}" ينتهي بعد ${d} يوم`});
    }
  });
  const tm=T.toISOString().slice(0,7);
  const paidIds=DB.get('payroll').filter(p=>p.month===tm&&p.status==='paid').map(p=>p.employeeId);
  const unpaid=DB.get('employees').filter(e=>e.status==='active'&&!paidIds.includes(e.id));
  if(unpaid.length)alerts.push({t:'info',msg:`${unpaid.length} موظف لم يُصرف راتبهم هذا الشهر`});
  return alerts;
}

function showNotif(){
  const list=document.getElementById('notifList');
  const alerts=getAlerts();
  if(!alerts.length){
    list.innerHTML='<div class="empty"><i class="fas fa-check-circle" style="color:#10B981;opacity:1"></i><p>لا توجد تنبيهات</p></div>';
  }else{
    list.innerHTML=alerts.map(a=>`<div class="al ${a.t==='warn'?'aw':a.t==='info'?'ai':'ae'}" style="margin-bottom:7px">
      <i class="fas fa-${a.t==='warn'?'exclamation-triangle':a.t==='info'?'info-circle':'times-circle'}"></i>${a.msg}
    </div>`).join('');
  }
  openOv('ovNotif');
}

function gSearchFn(e){
  if(e.key!=='Enter')return;
  const q=document.getElementById('gSearch').value.trim();
  if(!q)return;
  const lead=DB.get('leads').find(l=>l.name.includes(q)||l.phone.includes(q));
  if(lead){navigateTo('marketing');toast2('تم العثور على عميل','ok');return;}
  const emp=DB.get('employees').find(e2=>e2.name.includes(q));
  if(emp){navigateTo('hr');toast2('تم العثور على موظف','ok');return;}
  const proj=DB.get('projects').find(p=>p.name.includes(q));
  if(proj){navigateTo('projects');toast2('تم العثور على مشروع','ok');return;}
  toast2('لم يتم العثور على نتائج','warn');
}

function openEmpModal(id=null){
  editId=id;document.getElementById('empMT').textContent=id?'تعديل بيانات الموظف':'إضافة موظف جديد';
  ['eName','ePos','eSal','ePhone','eEmail','eNid','eBnk','eJoin'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';});
  document.getElementById('eDep').value='management';document.getElementById('eSt').value='active';

  document.getElementById('eProj').innerHTML=`<option value="">-- لا يوجد --</option>${projs.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}`;

    const e=DB.find('employees',id);if(!e)return;

function editEmp(id){openEmpModal(id);}
function saveEmp(){
  const name=document.getElementById('eName').value.trim();if(!name){toast2('يرجى إدخال اسم الموظف','err');return;}
  DB.save('employees',{
    id:editId||uid(),name,position:document.getElementById('ePos').value,department:document.getElementById('eDep').value,
    salary:+document.getElementById('eSal').value||0,phone:document.getElementById('ePhone').value,

    bankAccount:document.getElementById('eBnk').value,joinDate:document.getElementById('eJoin').value,

  });
  closeOv('ovEmp');toast2(editId?'تم التحديث':'تم إضافة الموظف','ok');renderHR('employees');
}
function delEmp(id){
  const e=DB.find('employees',id);
  confirm2('حذف الموظف',`حذف "${e?.name}"؟`,()=>{DB.del('employees',id);toast2('تم الحذف','ok');renderHR('employees');});
}

function openPayrollModal(empId){
  const emp=DB.find('employees',empId);if(!emp)return;
  _payrollEmpId=empId;
  document.getElementById('prName').value=emp.name;
  document.getElementById('prBase').value=emp.salary;
  document.getElementById('prCom').value=0;
  document.getElementById('prDed').value=0;
  document.getElementById('prMonth').value=new Date().toISOString().slice(0,7);
  document.getElementById('prDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('prNotes').value='';
  calcNet();openOv('ovPayroll');
}
function calcNet(){
  const b=+document.getElementById('prBase')?.value||0;
  const c=+document.getElementById('prCom')?.value||0;
  const d=+document.getElementById('prDed')?.value||0;
  const n=document.getElementById('prNet');if(n)n.value=b+c-d;
}
function savePayroll(){
  DB.save('payroll',{
    id:uid(),employeeId:_payrollEmpId,
    month:document.getElementById('prMonth').value,
    basicSalary:+document.getElementById('prBase').value||0,
    commissions:+document.getElementById('prCom').value||0,
    deductions:+document.getElementById('prDed').value||0,
    netSalary:+document.getElementById('prNet').value||0,
    paidDate:document.getElementById('prDate').value,status:'paid',
    notes:document.getElementById('prNotes').value,createdAt:new Date().toISOString()
  });
  closeOv('ovPayroll');toast2('تم صرف الراتب بنجاح','ok');renderHR('payroll');
}

function openAttendModal(){
  const emps=DB.get('employees').filter(e=>e.status==='active');

function openProfitModal(){
  const txs=DB.get('transactions');
  document.getElementById('pfYear').value=new Date().getFullYear();
  document.getElementById('pfPeriod').value='Annual';
  document.getElementById('pfRes').value=10;
  document.getElementById('pfRev').value=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  document.getElementById('pfExp').value=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  calcProfit();openOv('ovProfit');
}
function calcProfit(){
  const rev=+document.getElementById('pfRev')?.value||0;
  const exp=+document.getElementById('pfExp')?.value||0;
  const resPct=+document.getElementById('pfRes')?.value||0;

function pdfHead(title,sub=''){

    <div style="text-align:center;border-bottom:3px solid #4F46E5;padding-bottom:14px;margin-bottom:18px">

    </div>`;
}
function pdfTable(heads,rows,clrs=[]){
  return`<table style="width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12.5px">
    <thead><tr>${heads.map(h=>`<th style="background:#4F46E5;color:#fff;padding:7px 10px;text-align:right;border:1px solid #ddd">${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map((r,ri)=>`<tr style="background:${ri%2?'#fff':'#f8faff'}">${r.map((c,ci)=>`<td style="padding:7px 10px;border:1px solid #ddd;text-align:right${clrs[ci]?';color:'+clrs[ci]+';font-weight:700':''}">${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
}

async function genPDF(html,fname){
  try{
    const d=document.createElement('div');
    d.style.cssText='position:fixed;top:-9999px;left:-9999px;width:820px;direction:rtl;background:#fff';
    d.innerHTML=html;document.body.appendChild(d);
    const cv=await html2canvas(d,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    document.body.removeChild(d);
    const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
    const iw=190,ih=cv.height*iw/cv.width;
    let sy=0,ph=277,pgH=cv.width*ph/iw;
    while(sy<cv.height){
      const pc=document.createElement('canvas');
      pc.width=cv.width;pc.height=Math.min(cv.height-sy,pgH);
      pc.getContext('2d').drawImage(cv,0,-sy);
      if(sy>0)pdf.addPage();
      pdf.addImage(pc.toDataURL('image/png'),'PNG',10,10,iw,pc.height*iw/cv.width);
      sy+=pc.height;
    }
    pdf.save(fname+'.pdf');toast2('تم تصدير PDF بنجاح','ok');
  }catch(e){console.error(e);toast2('حدث خطأ في تصدير PDF - تأكد من إذن التنزيل','err');}
}

function getRptFilters(){
  const pf=document.getElementById('rptProj')?.value||'';
  const from=document.getElementById('rptFrom')?.value||'';
  const to=document.getElementById('rptTo')?.value||'';
  return{pf,from,to};
}
function filterTxs(type='all'){
  const{pf,from,to}=getRptFilters();
  return DB.get('transactions').filter(t=>{
    if(type!=='all'&&t.type!==type)return false;
    if(pf&&t.projectId!==pf)return false;
    if(from&&t.date<from)return false;
    if(to&&t.date>to)return false;
    return true;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));
}

      ['','#4F46E5','#10B981',''])+'</div>',`profit-${pr.year}-${pr.period}`);
}

  seed();checkTheme();renderSB();navigateTo('dashboard');
  document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeOv(o.id);}));
});
