<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة العقارات السحابي المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f1f5f9; color: #1e293b; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); position: fixed; height: 100vh; overflow-y: auto; z-index: 100; transition: 0.3s; }
        .logo { padding: 1.5rem; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; color: white; }
        .logo i { font-size: 2rem; color: #3b82f6; }
        .nav-item { padding: 0.8rem 1.5rem; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #cbd5e1; }
        .nav-item:hover, .nav-item.active { background: #334155; color: white; }
        .nav-item.active { border-right: 4px solid #3b82f6; background: #1e293b; }
        .main-content { margin-right: 280px; padding: 2rem; min-height: 100vh; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-bottom: 4px solid #3b82f6; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #0f172a; margin-top: 5px; }
        .section-card { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: #ef4444; color: white; padding: 0.4rem 0.8rem; font-size: 0.85rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #64748b; font-size: 0.9rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 2rem; border-radius: 15px; width: 90%; max-width: 500px; position: relative; }
        input, select { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        .page { display: none; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #3b82f6; z-index: 3000; display: none; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader"></div>

<div class="sidebar">
    <div class="logo"><i class="fas fa-city"></i><h2>نظام العقارات</h2></div>
    <div class="nav-item active" onclick="showPage('dashboard')"><i class="fas fa-th-large"></i><span>الرئيسية</span></div>
    <div class="nav-item" onclick="showPage('lands')"><i class="fas fa-map-marked-alt"></i><span>الأراضي</span></div>
    <div class="nav-item" onclick="showPage('projects')"><i class="fas fa-project-diagram"></i><span>المشاريع</span></div>
    <div class="nav-item" onclick="showPage('internalUnits')"><i class="fas fa-door-open"></i><span>مبيعات داخلية</span></div>
    <div class="nav-item" onclick="showPage('externalUnits')"><i class="fas fa-external-link-alt"></i><span>مبيعات خارجية</span></div>
    <div class="nav-item" onclick="showPage('marketers')"><i class="fas fa-user-tie"></i><span>المسوقين</span></div>
    <div class="nav-item" onclick="showPage('expenses')"><i class="fas fa-wallet"></i><span>المصروفات</span></div>
    <div class="nav-item" onclick="showPage('revenues')"><i class="fas fa-hand-holding-usd"></i><span>الإيرادات</span></div>
</div>

<div class="main-content">
    <div id="dashboardPage" class="page active-page">
        <div class="stats-grid" id="dashboardStats"></div>
        <div class="section-card">
            <h3>أحدث الحركات المالية</h3>
            <div id="recentTransactions"></div>
        </div>
    </div>

    <div id="landsPage" class="page"></div>
    <div id="projectsPage" class="page"></div>
    <div id="internalUnitsPage" class="page"></div>
    <div id="externalUnitsPage" class="page"></div>
    <div id="marketersPage" class="page"></div>
    <div id="expensesPage" class="page"></div>
    <div id="revenuesPage" class="page"></div>
</div>

<div class="modal" id="globalModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom: 1rem;"></h3>
        <form id="modalForm">
            <div id="modalInputs"></div>
            <div style="display:flex; gap:10px; margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary">حفظ في السحاب</button>
                <button type="button" class="btn" onclick="closeModal()" style="background:#e2e8f0">إلغاء</button>
            </div>
        </form>
    </div>
</div>

<script>
    // تكوين الاتصال بـ Supabase
    const SB_URL = 'https://trqhrgaiwsbabdcxxwra.supabase.co';
    const SB_KEY = 'sb_publishable_hWSjQL7lQIv-8rVhfRXzig_ci3SVn52';
    const client = supabase.createClient(SB_URL, SB_KEY);

    let store = { lands:[], projects:[], internalUnits:[], externalUnits:[], marketers:[], expenses:[], revenues:[] };

    // جلب البيانات الشامل وتحديث الواجهة
    async function refreshData() {
        document.getElementById('loader').style.display = 'block';
        try {
            const [l, p, iu, eu, m, ex, rev] = await Promise.all([
                client.from('lands').select('*').order('created_at', { ascending: false }),
                client.from('projects').select('*').order('created_at', { ascending: false }),
                client.from('internal_units').select('*').order('created_at', { ascending: false }),
                client.from('external_units').select('*').order('created_at', { ascending: false }),
                client.from('marketers').select('*').order('created_at', { ascending: false }),
                client.from('expenses').select('*').order('created_at', { ascending: false }),
                client.from('revenues').select('*').order('created_at', { ascending: false })
            ]);

            store.lands = l.data || [];
            store.projects = p.data || [];
            store.internalUnits = iu.data || [];
            store.externalUnits = eu.data || [];
            store.marketers = m.data || [];
            store.expenses = ex.data || [];
            store.revenues = rev.data || [];

            updateUI();
        } catch (e) {
            console.error("خطأ اتصال:", e);
        }
        document.getElementById('loader').style.display = 'none';
    }

    function updateUI() {
        const active = document.querySelector('.page.active-page').id.replace('Page', '');
        renderDashboard();
        renderTablePage('lands', 'إدارة الأراضي', ['الاسم', 'الموقع', 'المساحة', 'السعر'], ['name', 'location', 'area', 'price']);
        renderTablePage('projects', 'إدارة المشاريع', ['المشروع', 'الموقع', 'البداية', 'الحالة'], ['name', 'location', 'startDate', 'status']);
        renderTablePage('internalUnits', 'مبيعات الوحدات الداخلية', ['المشروع', 'رقم الوحدة', 'السعر', 'الحالة'], ['projectName', 'unitNumber', 'price', 'status']);
        renderTablePage('externalUnits', 'مبيعات العقارات الخارجية', ['العنوان', 'الغرف', 'السعر', 'الحالة'], ['address', 'rooms', 'price', 'status']);
        renderTablePage('marketers', 'سجل المسوقين', ['الاسم', 'الهاتف', 'العمولة', 'المبيعات'], ['name', 'phone', 'commission', 'salesCount']);
        renderTablePage('expenses', 'سجل المصروفات', ['الوصف', 'المبلغ', 'التاريخ', 'التصنيف'], ['description', 'amount', 'date', 'category']);
        renderTablePage('revenues', 'سجل الإيرادات', ['الوصف', 'المبلغ', 'التاريخ', 'المصدر'], ['description', 'amount', 'date', 'source']);
    }

    function renderDashboard() {
        const totalRev = store.revenues.reduce((s, r) => s + Number(r.amount), 0);
        const totalExp = store.expenses.reduce((s, e) => s + Number(e.amount), 0);
        
        document.getElementById('dashboardStats').innerHTML = `
            <div class="stat-card"><div>الأراضي</div><div class="stat-value">${store.lands.length}</div></div>
            <div class="stat-card"><div>المشاريع</div><div class="stat-value">${store.projects.length}</div></div>
            <div class="stat-card"><div>الإيرادات</div><div class="stat-value" style="color:#10b981">${totalRev.toLocaleString()} ر.س</div></div>
            <div class="stat-card"><div>المصروفات</div><div class="stat-value" style="color:#ef4444">${totalExp.toLocaleString()} ر.س</div></div>
        `;
    }

    function renderTablePage(key, title, ths, fields) {
        const tableId = key === 'internalUnits' ? 'internal_units' : key === 'externalUnits' ? 'external_units' : key;
        let html = `<div class="section-card"><div style="display:flex;justify-content:space-between"><h2>${title}</h2><button class="btn btn-primary" onclick="openAdd('${tableId}')">+ إضافة</button></div>
        <table><thead><tr>${ths.map(h=>`<th>${h}</th>`).join('')}<th>إجراء</th></tr></thead><tbody>`;
        
        store[key].forEach(item => {
            html += `<tr>${fields.map(f=>`<td>${item[f]||'-'}</td>`).join('')}
            <td><button class="btn btn-danger" onclick="deleteItem('${tableId}','${item.id}')">حذف</button></td></tr>`;
        });
        document.getElementById(key + 'Page').innerHTML = html + `</tbody></table></div>`;
    }

    async function deleteItem(table, id) {
        if(!confirm("سيتم حذف السجل نهائياً من السحاب، هل أنت متأكد؟")) return;
        await client.from(table).delete().eq('id', id);
        refreshData();
    }

    function openAdd(table) {
        const modal = document.getElementById('globalModal');
        const inputs = document.getElementById('modalInputs');
        document.getElementById('modalTitle').innerText = "إضافة سجل جديد - " + table;
        
        let fields = "";
        if(table === 'lands') fields = `<input id="name" placeholder="اسم الأرض"><input id="location" placeholder="الموقع"><input id="area" placeholder="المساحة"><input id="price" type="number" placeholder="السعر">`;
        else if(table === 'revenues') fields = `<input id="description" placeholder="الوصف"><input id="amount" type="number" placeholder="المبلغ"><input id="date" type="date"><input id="source" placeholder="المصدر">`;
        else if(table === 'expenses') fields = `<input id="description" placeholder="الوصف"><input id="amount" type="number" placeholder="المبلغ"><input id="date" type="date"><input id="category" placeholder="التصنيف">`;
        else if(table === 'projects') fields = `<input id="name" placeholder="اسم المشروع"><input id="location" placeholder="الموقع"><input id="startDate" type="date"><select id="status"><option>قيد التنفيذ</option><option>مكتمل</option></select>`;
        else if(table === 'internal_units') fields = `<input id="projectName" placeholder="اسم المشروع"><input id="unitNumber" placeholder="رقم الوحدة"><input id="price" type="number" placeholder="السعر"><select id="status"><option>متاحة</option><option>مباعة</option></select>`;
        else if(table === 'external_units') fields = `<input id="address" placeholder="العنوان"><input id="rooms" placeholder="عدد الغرف"><input id="price" type="number" placeholder="السعر"><select id="status"><option>متاحة</option><option>مباعة</option></select>`;
        else if(table === 'marketers') fields = `<input id="name" placeholder="اسم المسوق"><input id="phone" placeholder="رقم الجوال"><input id="commission" type="number" placeholder="نسبة العمولة">`;

        inputs.innerHTML = fields;
        modal.style.display = 'flex';
        
        document.getElementById('modalForm').onsubmit = async (e) => {
            e.preventDefault();
            let obj = {};
            Array.from(e.target.elements).filter(el => el.id).forEach(el => obj[el.id] = el.value);
            await client.from(table).insert([obj]);
            closeModal();
            refreshData();
        };
    }

    function closeModal() { document.getElementById('globalModal').style.display = 'none'; }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
        document.getElementById(p + 'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
        event?.currentTarget?.classList?.add('active');
    }

    window.onload = refreshData;
</script>
</body>
</html>
