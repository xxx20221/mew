<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // إعدادات الاتصال
    const SUPABASE_URL = 'https://trqhrgaiwsbabdcxxwra.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hWSjQL7lQIv-8rVhfRXzig_ci3SVn52'; // تنبيه: يفضل نقل المفاتيح لملف .env لاحقاً
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // مصفوفات البيانات المحلية (ستحدث من السحاب)
    let lands = [], projects = [], internalUnits = [], externalUnits = [], marketers = [], expenses = [], revenues = [];

    // دالة جلب كافة البيانات من السحاب فور تشغيل الموقع
    async function loadAllData() {
        try {
            const [l, p, iu, eu, m, ex, rev] = await Promise.all([
                supabase.from('lands').select('*'),
                supabase.from('projects').select('*'),
                supabase.from('internal_units').select('*'),
                supabase.from('external_units').select('*'),
                supabase.from('marketers').select('*'),
                supabase.from('expenses').select('*'),
                supabase.from('revenues').select('*')
            ]);

            lands = l.data || [];
            projects = p.data || [];
            internalUnits = iu.data || [];
            externalUnits = eu.data || [];
            marketers = m.data || [];
            expenses = ex.data || [];
            revenues = rev.data || [];

            showPage('dashboard'); // عرض الصفحة الرئيسية بعد تحميل البيانات
        } catch (err) {
            console.error("خطأ في تحميل البيانات السحابية:", err);
        }
    }

    // دالة الحفظ السحابي بدلاً من localStorage
    async function cloudSave(table, data, callback) {
        const { error } = await supabase.from(table).insert([data]);
        if (error) alert("خطأ في الحفظ: " + error.message);
        else {
            await loadAllData(); // تحديث البيانات فوراً
            if(callback) callback();
        }
    }

    // دالة الحذف السحابي
    async function cloudDelete(table, id, callback) {
        const { error } = await supabase.from(table).delete().eq('id', id);
        if (error) alert("خطأ في الحذف");
        else {
            await loadAllData();
            if(callback) callback();
        }
    }

    // --- تعديل دوال الإضافة لتستخدم السحاب ---
    // مثال للأراضي (طبق نفس المنطق للبقية):
    function renderLands() {
        let html = `<div class="section-card"><div style="display:flex; justify-content:space-between"><h2>الأراضي</h2><button class="btn btn-primary" id="addLandBtn">+ إضافة أرض</button></div>
        <table><thead><tr><th>الاسم</th><th>الموقع</th><th>المساحة</th><th>السعر</th><th>الإجراءات</th></tr></thead><tbody>`;
        lands.forEach((l) => {
            html += `<tr><td>${l.name}</td><td>${l.location}</td><td>${l.area}</td><td>${l.price.toLocaleString()}</td>
            <td><button class="btn btn-danger btn-sm" onclick="cloudDelete('lands', '${l.id}', renderLands)">حذف</button></td></tr>`;
        });
        document.getElementById('landsPage').innerHTML = html + `</tbody></table></div>`;
        
        document.getElementById('addLandBtn')?.addEventListener('click', () => {
            showModal('إضافة أرض سحابية', `<input placeholder="الاسم" id="name"><input placeholder="الموقع" id="location"><input placeholder="المساحة" id="area" type="number"><input placeholder="السعر" id="price" type="number">`, (form) => {
                const newData = { name: form.name.value, location: form.location.value, area: form.area.value, price: Number(form.price.value) };
                cloudSave('lands', newData, renderLands);
            });
        });
    }

    // تشغيل النظام
    document.addEventListener('DOMContentLoaded', loadAllData);

    // (بقية دوال التنقل RenderDashboard و showPage تبقى كما هي مع تغيير مصادر البيانات للمصفوفات الجديدة)
</script>
